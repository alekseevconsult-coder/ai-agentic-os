# Optional MCP servers — include with:
# docker compose -f docker-compose.yml -f mcp/docker-compose.mcp.yml up -d

networks:
  agentic-os-net:
    external: true
    name: ai-agentic-os_agentic-os-net

services:
  mcp-postgres:
    image: node:20-alpine
    restart: unless-stopped
    command: >
      sh -c "npx -y @modelcontextprotocol/server-postgres
      postgresql://${POSTGRES_USER:-agenticadmin}:${POSTGRES_PASSWORD}@postgres:5432/analytics"
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-agenticadmin}
    networks:
      - agentic-os-net
    mem_limit: 256m

  mcp-filesystem:
    image: node:20-alpine
    restart: unless-stopped
    command: >
      sh -c "npx -y @modelcontextprotocol/server-filesystem /workspace"
    volumes:
      - ./workspace:/workspace
    networks:
      - agentic-os-net
    mem_limit: 128m
